name: fairlyapp
version: '2.39'
services:
    mongodb:
        image: mongo
        container_name: fairly-mongo
        restart: unless-stopped
        ports:
            - 27017:27017
        env_file:
            - ./backend/.env
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 5s
            timeout: 5s
            retries: 10

    backend:
        build: 
            context: ./backend
        container_name: fairly-backend
        restart: unless-stopped
        ports:
            - 8000:8000
        env_file:
            - ./backend/.env
        depends_on:
            mongodb:
                condition: service_healthy

    

        

    


